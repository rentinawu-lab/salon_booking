{% extends "base.html" %}
{% block title %}{% if staff %}Edit Staff{% else %}Add Staff{% endif %}{% endblock %}
{% block content %}
<div class="page-header">
    <h2>{% if staff %}Edit Staff{% else %}Add Staff{% endif %}</h2>
</div>
<div class="card" style="max-width:520px;">
    <form method="post" class="styled-form">
        {% csrf_token %}
        {% for field in form %}
        <div class="field">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {{ field.errors }}
        </div>
        {% endfor %}
        <div class="actions">
            <button type="submit" class="btn">{% if staff %}Save Changes{% else %}Create Staff{% endif %}</button>
            <a href="{% url 'salon_app:staff_list' %}" class="btn secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
