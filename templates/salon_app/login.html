{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salon Login</title>
    <link rel="stylesheet" href="{% static 'salon_app/css/style.css' %}" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <style>
      body {
        background: linear-gradient(135deg, #f8f9fa, #f0e6ec);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }
      .login-card {
        width: 400px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(159, 74, 127, 0.2);
      }
      .login-header {
        color: #9f4a7f;
        font-weight: 700;
        text-align: center;
        margin-bottom: 30px;
      }
      .btn-login {
        background: linear-gradient(135deg, #9f4a7f, #7a3860);
        border: none;
        color: white;
        padding: 12px;
        font-weight: 600;
        transition: all 0.3s ease;
      }
      .btn-login:hover {
        background: linear-gradient(135deg, #7a3860, #5f2e4a);
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(159, 74, 127, 0.3);
      }
      .register-link {
        color: #9f4a7f;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s ease;
      }
      .register-link:hover {
        color: #7a3860;
        text-decoration: underline;
      }
      .error-message {
        color: #e03131;
        font-size: 14px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="login-card card">
      <div class="card-body p-5">
        <h2 class="login-header"><i class="bi bi-scissors"></i> Salon Login</h2>

        {% if form.errors %}
        <div class="alert alert-danger error-message" role="alert">
          <i class="bi bi-exclamation-circle"></i> Invalid username or password.
        </div>
        {% endif %}

        <form method="post" class="styled-form">
          {% csrf_token %}

          <div class="field mb-3">
            <label for="id_username" class="form-label">Username</label>
            {{ form.username }}
          </div>

          <div class="field mb-4">
            <label for="id_password" class="form-label">Password</label>
            {{ form.password }}
          </div>

          <button type="submit" class="btn btn-login w-100">
            <i class="bi bi-box-arrow-in-right"></i> Log In
          </button>
        </form>

        <p
          style="
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
          "
        >
          Don't have an account?
          <a href="{% url 'salon_app:register' %}" class="register-link"
            >Register</a
          >
        </p>
      </div>
    </div>
  </body>
</html>
