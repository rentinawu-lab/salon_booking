{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Salon Management</title>
    <link rel="stylesheet" href="{% static 'salon_app/css/style.css' %}">
</head>
<body style="display:flex; align-items:center; justify-content:center; height:100vh;">
    <div class="card" style="width:340px;">
        <h2 style="margin-top:0; color:#a61e4d; text-align:center;">💇 Salon Login</h2>
        {% if form.errors %}
        <p style="color:#e03131; font-size:14px;">Invalid username or password.</p>
        {% endif %}
        <form method="post" class="styled-form">
            {% csrf_token %}
            <div class="field">
                <label for="id_username">Username</label>
                {{ form.username }}
            </div>
            <div class="field">
                <label for="id_password">Password</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn" style="width:100%;">Log In</button>
        </form>
        <p style="text-align:center; margin-top:14px; font-size:13px;">
            Don't have an account? <a href="{% url 'salon_app:register' %}">Register</a>
        </p>
    </div>
</body>
</html>
