{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Salon Management</title>
    <link rel="stylesheet" href="{% static 'salon_app/css/style.css' %}">
</head>
<body style="display:flex; align-items:center; justify-content:center; height:100vh;">
    <div class="card" style="width:380px;">
        <h2 style="margin-top:0; color:#a61e4d; text-align:center;">💇 Create Your Account</h2>
        <p style="text-align:center; font-size:13px; color:#8a7480; margin-top:-6px;">Sign up to book and manage your own appointments.</p>
        <form method="post" class="styled-form">
            {% csrf_token %}
            {% for field in form %}
            <div class="field">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}<small style="color:#8a7480;">{{ field.help_text }}</small>{% endif %}
                {{ field.errors }}
            </div>
            {% endfor %}
            <button type="submit" class="btn" style="width:100%;">Register</button>
        </form>
        <p style="text-align:center; margin-top:14px; font-size:13px;">
            Already have an account? <a href="{% url 'salon_app:login' %}">Log in</a>
        </p>
    </div>
</body>
</html>
