{% extends "base.html" %}
{% block title %}Delete{% endblock %}
{% block content %}
<div class="card" style="max-width:480px;">
    <h2 style="margin-top:0; color:#a61e4d;">Delete this {{ title }}?</h2>
    <p>Are you sure you want to delete <strong>{{ object }}</strong>? This action cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <div class="actions">
            <button type="submit" class="btn danger">Yes, delete</button>
            <a href="{% url cancel_url %}" class="btn secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
