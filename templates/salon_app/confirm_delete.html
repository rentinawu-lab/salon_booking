{% extends "base.html" %} {% block title %}Delete{% endblock %} {% block content
%}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger">
      <div class="card-body">
        <div class="text-center mb-4">
          <i
            class="bi bi-exclamation-triangle"
            style="font-size: 48px; color: #dc3545"
          ></i>
        </div>

        <h3 class="card-title text-center mb-3" style="color: #9f4a7f">
          Delete {{ title }}?
        </h3>

        <p class="text-center mb-4">
          Are you sure you want to delete <strong>{{ object }}</strong>?
        </p>

        <p class="text-center text-muted small mb-4">
          <i class="bi bi-info-circle"></i> This action cannot be undone.
        </p>

        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2 justify-content-center">
            <button type="submit" class="btn btn-danger">
              <i class="bi bi-trash"></i> Yes, Delete
            </button>
            <a href="{% url cancel_url %}" class="btn btn-outline-secondary">
              <i class="bi bi-x-circle"></i> Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
